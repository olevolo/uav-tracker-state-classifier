name: release
#
# On v* tag: build wheel, publish to PyPI via OIDC, attach SBOM. Stub-level
# today — full enablement per PLAN §7a.7 and devops.md §6.6.
#
# DevOps: swap @v4/@v5 tags for full SHAs before enforcing branch protection.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: "build wheel + PyPI publish + SBOM"
    runs-on: ubuntu-latest
    steps:
      # DevOps: swap to full SHA before enforcing branch protection
      - uses: actions/checkout@v4

      # DevOps: swap to full SHA before enforcing branch protection
      - uses: astral-sh/setup-uv@v3

      # DevOps: swap to full SHA before enforcing branch protection
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: uv build (stub — dry-run)
        run: |
          echo "release: uv build would run here in the real workflow."
          echo "Artifacts produced: dist/*.whl dist/*.tar.gz"
          # uv build --sdist --wheel

      # DevOps: swap to full SHA before enforcing branch protection
      - name: Publish to PyPI (OIDC) — stubbed
        if: false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses trusted publishing via OIDC; no long-lived token.
          packages-dir: dist/

      # DevOps: swap to full SHA before enforcing branch protection
      - name: Generate SBOM — stubbed
        if: false
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json

      - name: Summary
        run: |
          echo "release: stub workflow. Real enablement deferred to Phase 7."
