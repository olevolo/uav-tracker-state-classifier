# APCE-based hybrid: KCF Henriques (T0) + MobileTrack (T1).
# Switched by authentic APCESignal using the 2-D correlation response map
# exposed by KCF Henriques (TrackState.aux["response_map"]).
#
# APCE = (F_max - F_min)^2 / mean((F - F_min)^2) — a sharp, clean peak
# gives high APCE (tracker confident); a flat / multi-modal map gives low
# APCE (tracker confused).  Signal = 1 - clip(apce / apce_init, 0, 1).
#
# This is the recommended config once trained MobileTrack weights are loaded.
# Requires kcf_henriques (not kcf_kalman) as tier-0 — cv2.TrackerKCF does
# not expose a response map and APCESignal would fall back to Option A proxy.

trackers:
  0: {name: kcf_henriques, args: {min_peak_ratio: 0.25}}
  1: {name: mobiletrack, args: {device: cpu, dtype: float32}}
signals:
  - {name: apce, args: {}}
scheduler:
  name: hysteresis_binary
  args: {E_hi: 0.35, E_lo: 0.20, confirm_frames: 3, cooldown_frames: 10, signal_name: apce}
dataset: {name: uav123}
limit: null
seed: 42
