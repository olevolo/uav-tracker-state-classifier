# Paper-fidelity hybrid: KCF+Kalman (T0) + MobileTrack (T1),
# switched by MotionEntropy + HysteresisBinary with paper defaults.
#
# Phase 4 update: tier-1 is now mobiletrack (paper's primary deep tracker,
# per Phase 3.5 mobiletrack commit). MotionEntropy is the paper's core
# contribution. This is the flagship Phase 4 config.

trackers:
  0: {name: kcf_kalman, args: {}}
  1: {name: mobiletrack, args: {device: cpu, dtype: float32}}
signals:
  - {name: motion_entropy, args: {n_bins: 16, alpha: 0.8, mag_threshold: 1.0}}
scheduler:
  name: hysteresis_binary
  args: {E_hi: 0.65, E_lo: 0.50, confirm_frames: 5, cooldown_frames: 5, signal_name: motion_entropy}
dataset: {name: synthetic}
limit: 3
seed: 42
