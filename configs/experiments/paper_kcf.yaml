# Paper baseline: KCF+Kalman tracker only (no switching).
#
# Target: Phase 1 exit demo reproduces paper Table 2 row 1 (KCF).
# Paper numbers: UAV123 AUC 0.432, Pr@20 51.7%, FPS ~160. Reference only,
# not a reproduction contract (see PLAN.md §10.2).

defaults:
  - /trackers@runner.trackers.0: kcf_kalman
  - /datasets@dataset: uav123
  - _self_

runner:
  _target_: uav_tracker.runner.SingleTrackerRunner
  trackers:
    - {tier: 0}
  signals: []
  scheduler: null
  detector: null

evaluation:
  protocol: ope                       # one-pass evaluation (OTB convention)
  seed: 42
  output_dir: results/phase1/paper_kcf
