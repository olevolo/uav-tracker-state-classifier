# Paper heavy-tier baseline: Siamese tracker only.
#
# NOTE: MobileTrack (Xue 2022) is opt-in — weights access is gated and
# there is no MobileTrack implementation per ADR-0003 deviation. This
# config falls back to SiamFC (Bertinetto 2016) by default. To switch
# to MobileTrack once weights are available, change `tracker.name` to
# "mobiletrack" and update `tracker.args` accordingly.
#
# Paper numbers for MobileTrack (reference only, not a contract):
#   UAV123 AUC 0.690, Pr@20 77.3%, FPS ~80.

tracker:
  name: siamfc
  args:
    device: cpu
    dtype: float32

dataset:
  name: synthetic

limit: null
seed: 42
