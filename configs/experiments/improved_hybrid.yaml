# Our improved hybrid: CircularResultant signal + AdaptiveThreshold scheduler.
#
# Default for Phase 5+. Detector slot is present but null pending Phase 6 (see
# configs/experiments/hybrid_with_detection.yaml for 3-tier version).
#
# Rationale: paper weaknesses §2.2 (Shannon high-variance at small N) and §2.4
# (hard thresholds) are addressed by swapping the signal and scheduler while
# keeping the rest of the stack constant. Must show Pareto dominance on (AUC,
# FPS) vs. paper_entropy_hybrid per ADR-0007 before this becomes the new
# Phase-4+ default.

defaults:
  - /trackers@runner.trackers.0: kcf_kalman
  - /trackers@runner.trackers.1: siamfc
  - /signals@runner.signals.0: circular_resultant
  - /schedulers@runner.scheduler: adaptive_threshold
  - /datasets@dataset: uav123
  - _self_

runner:
  _target_: uav_tracker.runner.HybridRunner
  trackers:
    - {tier: 0}
    - {tier: 1}
  signals:
    - {}
  scheduler:
    args:
      signal: circular_resultant
      confirm_frames: 5
      cooldown_frames: 5
      warm_standby_cadence: 0
  detector: null

evaluation:
  protocol: ope
  seed: 42
  output_dir: results/phase5/improved_hybrid
