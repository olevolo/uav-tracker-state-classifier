# Phase 6 detector on/off ablation.
#
# Quantifies the AUC gain and FLOPs cost of the detection tier on the full
# UAV123 (hard), not the 20-seq subset, because total-loss events are rare and
# we need the denominator.

defaults:
  - /trackers@runner.trackers.0: kcf_kalman
  - /trackers@runner.trackers.1: siamfc
  - /signals@runner.signals.0: motion_entropy
  - /datasets@dataset: uav123
  - _self_

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      runner.detector.enabled: true,false

runner:
  _target_: uav_tracker.runner.HybridRunner
  trackers:
    - {tier: 0}
    - {tier: 1}
  signals:
    - {}
  scheduler:
    name: multi_tier                  # collapses to binary hysteresis when detector disabled
    args:
      signal: motion_entropy
      E_hi: [0.65, 0.90]
      E_lo: [0.50, 0.70]
      confirm_frames: [5, 5]
      cooldown_frames: [5, 10]
      tau_lost: 0.20
      M_frames: 10
      det_conf_min: 0.40
      max_detect_frames: 30
  detector:
    _target_: uav_tracker.detectors.yolo.YOLOv8Detector
    enabled: true                     # overridden by sweep
    weights: yolov8n.pt
    device: cuda
    conf_threshold: 0.25

evaluation:
  protocol: ope
  seed: 42
  output_dir: results/phase6/ablation_detection
