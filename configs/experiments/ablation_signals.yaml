# Phase 5 signal-sweep ablation.
#
# Compares 4 signal alternatives with identical base hybrid:
#   tier-0: kcf_kalman, tier-1: mobiletrack,
#   scheduler: hysteresis_binary (paper defaults)
# Dataset: synthetic (seed 42), no external data required.
#
# Usage:
#   .venv/bin/uav-tracker ablate --sweep configs/experiments/ablation_signals.yaml --limit 3

sweep_type: signals

base:
  dataset: {name: synthetic}
  seed: 42
  trackers:
    0: {name: kcf_kalman, args: {}}
    1: {name: mobiletrack, args: {device: cpu, dtype: float32}}
  scheduler:
    name: hysteresis_binary
    args: {E_hi: 0.65, E_lo: 0.50, confirm_frames: 5, cooldown_frames: 5}

variants:
  - name: motion_entropy
    signal: {name: motion_entropy, args: {n_bins: 16, alpha: 0.8, mag_threshold: 1.0}}
    scheduler_signal_name: motion_entropy

  - name: circular_resultant
    signal: {name: circular_resultant, args: {mag_threshold: 1.0, alpha: 0.8}}
    scheduler_signal_name: circular_resultant

  - name: apce
    signal: {name: apce, args: {}}
    scheduler_signal_name: apce

  - name: flow_divergence
    signal: {name: flow_divergence, args: {mag_threshold: 0.5, alpha: 0.6}}
    scheduler_signal_name: flow_divergence
