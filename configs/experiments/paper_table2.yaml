# Paper Table 2 reproduction sweep.
#
# Run with:
#   python scripts/run_benchmark.py --sweep configs/experiments/paper_table2.yaml \
#       --dataset synthetic --limit 1
#
# The `fixed_periodic` variant is skipped because FixedPeriodicScheduler does
# not exist in the schedulers/ package (no implementation as of Phase 6).
# Add it and remove the skip_note when the scheduler is implemented.

name: paper_table2

variants:
  - name: kcf
    config: configs/experiments/paper_kcf.yaml

  - name: mobiletrack
    config: configs/experiments/paper_mobiletrack.yaml

  - name: entropy_hybrid
    config: configs/experiments/paper_entropy_hybrid.yaml

  # NOTE: FixedPeriodicScheduler is not yet implemented (Phase 7 gap).
  # When available, remove skip_note and set config to paper_fixed_periodic.yaml.
  - name: fixed_periodic
    config: configs/experiments/paper_fixed_periodic.yaml
    skip_note: >
      FixedPeriodicScheduler not yet implemented — skipping this variant.
      To enable: implement schedulers/fixed_periodic.py, register as
      "fixed_periodic", and remove this skip_note.

datasets:
  - synthetic
  - uav123
