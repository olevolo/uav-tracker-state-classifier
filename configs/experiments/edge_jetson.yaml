# Phase 9: Jetson Orin Nano edge deployment.
#
# Exit demo (PLAN §11 Phase 9): hybrid (entropy signal, ours config) >=50 FPS
# at <10 W on Jetson Orin Nano 8GB. Uses TRT-exported Siamese backbone and
# FP16 everywhere.

defaults:
  - /trackers@runner.trackers.0: kcf_kalman
  - /trackers@runner.trackers.1: siamfc
  - /signals@runner.signals.0: motion_entropy
  - /schedulers@runner.scheduler: hysteresis_binary
  - /datasets@dataset: uav123
  - _self_

runner:
  _target_: uav_tracker.runner.HybridRunner
  trackers:
    - {tier: 0}
    - {tier: 1, args: {device: cuda, dtype: float16, backend: tensorrt,
                       engine_path: weights/siamfc_orin_fp16.engine}}
  signals:
    - {}
  scheduler:
    args:
      signal: motion_entropy
      E_hi: 0.65
      E_lo: 0.50
      confirm_frames: 5
      cooldown_frames: 5
      warm_standby_cadence: 0
  detector: null

evaluation:
  protocol: ope
  seed: 42
  output_dir: results/phase9/edge_jetson
  # Edge-specific: also emit power telemetry + FPS/W.
  edge:
    log_power: true
    power_sampling_hz: 5
    target_fps: 50
    target_power_w: 10
