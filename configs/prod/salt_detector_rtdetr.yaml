# SALT detector ablation — RT-DETRv2-S (COCO pre-trained)
# Minimal delta from salt.yaml; only the detector section differs.
#
# Key difference from yolo26m baseline:
#   - COCO-trained: detects all 80 COCO classes (person, car, motorcycle, truck, ...)
#   - NO VisDrone fine-tuning → worse on tiny/distant UAV-view targets
#   - Transformer architecture (ResNet-18vd backbone) → stronger on contextual detection
#   - Sorting by proximity to hint_bbox is implemented in RTDETRv2Detector.detect()
#
# Weights required:
#   $UAV_WEIGHTS_ROOT/rtdetr/rtdetrv2_r18vd_120e_coco_rerun_48.1.pth
#   (currently at ~/projects/rtdetrv2_r18vd_120e_coco_rerun_48.1.pth — needs symlinking)
#
# RT-DETR source repo required at:
#   ~/projects/RT-DETR/rtdetrv2_pytorch/  (already cloned)

_meta:
  ablation: detector
  variant: rtdetrv2_s
  notes: >
    RT-DETRv2-S (ResNet-18vd, 48.1% mAP COCO). End-to-end transformer detector.
    Sorts detections by proximity to hint_bbox — good spatial priming.
    COCO classes: use target_classes filter to limit to UAV-relevant IDs
    (person=0, car=2, motorcycle=3, airplane=4, truck=7, bird=14) or
    leave null for all classes (rely on Guard 3 cosine filter).
    Higher conf_threshold=0.30 vs 0.25 baseline to compensate for COCO → VisDrone gap.

tracker:
  name: sglatrack
  device: auto
  # CE token pruning: kr=0.50 at layer 3 gives +0.006 vs no-pruning.
  # ce_loc and ce_keep_ratio are applied inside the tracker at load time; not
  # passed as constructor kwargs (those are controlled by the weights config).

detector:
  name: rtdetrv2_s                # RT-DETRv2-S, COCO pre-trained
  conf_threshold: 0.30            # slightly higher than YOLO26m: COCO scores well-calibrated
  # target_classes: null          # uncomment and list COCO IDs to restrict class set
  # e.g.: target_classes: [0, 2, 3, 4, 7, 14]  # person, car, motorcycle, airplane, truck, bird

appearance_memory:
  name: cosine_memory
  enabled: true
  max_templates: 20
  forgetting_factor: 0.95
  store_interval: 10
  min_confidence: 0.60
  drift_threshold: 0.35

motion_predictor:
  name: lstm_online
  enabled: false  # confirmed zero AUC benefit

# SALT-RD learned controller
saltrd:
  enabled: false  # disabled for pure detector ablation — measures RT-DETRv2 detector impact only

dataset: uav123
seed: 42
