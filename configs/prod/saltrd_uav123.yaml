# saltrd_uav123.yaml — SALT-RD learned controller, UAV123 dataset

tracker:
  name: sglatrack
  device: auto

detector:
  name: yolo26m_visdrone   # VisDrone fine-tuned YOLO26m — UAV-specific, 55% mAP@0.5
  conf_threshold: 0.25

appearance_memory:
  name: cosine_memory
  enabled: true
  max_templates: 20
  forgetting_factor: 0.95
  store_interval: 10
  min_confidence: 0.60
  drift_threshold: 0.35

motion_predictor:
  name: lstm_online
  enabled: false  # confirmed zero AUC benefit

saltrd:
  enabled: true
  checkpoint: saltr/checkpoints/saltrd_v21_uav123/saltrd_policy_best.pt
  reinit_threshold: 0.65
  cosine_threshold: 0.25
  candidate_scorer_checkpoint: saltr/checkpoints/candidate_scorer_v21_uav123/best.pt

dataset: uav123
seed: 42
