# SALT — SGLATrack + SALT-RD learned controller

tracker:
  name: sglatrack
  device: auto
  # CE token pruning at layer 3 (only reachable pruning point: i < start_layer=5).
  # Three fixes applied to base_backbone.py before CE worked correctly:
  #   Q1: _CE_LOC={3} (was {3,6,9} — layers 6,9 unreachable)
  #   Q2: scores current block i's output with block i's own QKV (was i+1)
  #   Q4: CTEM uses center 4×4 template (was mean of all 64)
  # CE at kr=0.50 gives MEAN=0.616 (+0.006 vs no-pruning 0.610).
  ce_loc: [3]
  ce_keep_ratio: 0.50   # single value — no state-based routing

detector:
  name: yolo26m_visdrone   # VisDrone fine-tuned YOLO26m — UAV-specific, 55% mAP@0.5
  conf_threshold: 0.25     # low threshold for recovery — filtered by controller action

appearance_memory:
  name: cosine_memory
  enabled: true
  max_templates: 20
  forgetting_factor: 0.95
  store_interval: 10
  min_confidence: 0.60
  drift_threshold: 0.35

motion_predictor:
  name: lstm_online
  enabled: false  # confirmed zero AUC benefit

# SALT-RD learned controller — set checkpoint to enable live policy inference
saltrd:
  enabled: false
  checkpoint: null   # set to saltr/checkpoints/policy_reinit_v1/saltrd_policy_best.pt

dataset: uav123
seed: 42
