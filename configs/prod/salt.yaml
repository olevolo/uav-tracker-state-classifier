# SALT — Scene-Adaptive Learning Tracker
# Full pipeline: SGLATrack + TSA routing + YOLOv8n recovery

# SALT-RD phase gates — set to false to disable for ablation
enable_ce: false
enable_dynamic: false        # alias: motion_predictor.enabled already handles this
enable_velocity_drift: false
enable_salt_rd: false

tracker:
  name: sglatrack
  device: auto
  # CE token pruning at layer 3 (only reachable pruning point: i < start_layer=5).
  # Three fixes applied to base_backbone.py before CE worked correctly:
  #   Q1: _CE_LOC={3} (was {3,6,9} — layers 6,9 unreachable)
  #   Q2: scores current block i's output with block i's own QKV (was i+1)
  #   Q4: CTEM uses center 4×4 template (was mean of all 64)
  # CE at kr=0.50 gives MEAN=0.616 (+0.006 vs no-pruning 0.610).
  ce_loc: [3]
  ce_keep_ratio_by_state:
    CONFIRMED:       [0.5, 0.5, 0.5]   # 50% search tokens kept at layer 3
    LOW_RES:         [1.0, 1.0, 1.0]
    DYNAMIC:         [1.0, 1.0, 1.0]
    OCCLUDED:        [1.0, 1.0, 1.0]
    DISTRACTOR_RISK: [1.0, 1.0, 1.0]
    LOST:            null               # detector takes over

tsa:
  device: auto
  adapt_interval: 20
  adapt_enabled: false
  buffer_size: 100
  motion_residual_threshold: 0.5
  drift_threshold: 0.35
  # Supervised MLP head trained on UAV123 with real SGLATrack features.
  # Set to null to fall back to rule-based APCE histogram confidence.
  weights_path: weights/tsa_head_uav123.pth

detector:
  name: yolo26m_visdrone   # VisDrone fine-tuned YOLO26m — UAV-specific, 55% mAP@0.5
  conf_threshold: 0.25     # low threshold for recovery — we filter by appearance anyway

appearance_memory:
  name: cosine_memory
  enabled: true  # needed for ref embedding in recovery guard (Guard 3)
  max_templates: 20
  forgetting_factor: 0.95
  store_interval: 10
  min_confidence: 0.60
  drift_threshold: 0.35

motion_predictor:
  name: lstm_online
  enabled: false  # causes false DYNAMIC labels, zero AUC benefit
  hidden_size: 32
  seq_len: 10

dataset: uav123
seed: 42
