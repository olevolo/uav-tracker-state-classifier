# SALT — SGLATrack + SALT-RD learned controller

tracker:
  name: sglatrack
  device: auto
  # CE token pruning: kr=0.50 at layer 3 gives +0.006 vs no-pruning.
  # ce_loc and ce_keep_ratio are applied inside the tracker at load time; not
  # passed as constructor kwargs (those are controlled by the weights config).

detector:
  name: yolo26m_visdrone   # VisDrone fine-tuned YOLO26m — UAV-specific, 55% mAP@0.5
  conf_threshold: 0.25     # low threshold for recovery — filtered by controller action

appearance_memory:
  name: cosine_memory
  enabled: true
  max_templates: 20
  forgetting_factor: 0.95
  store_interval: 10
  min_confidence: 0.60
  drift_threshold: 0.35

motion_predictor:
  name: lstm_online
  enabled: false  # confirmed zero AUC benefit

# SALT-RD learned controller
saltrd:
  enabled: true
  checkpoint: saltr/checkpoints/policy_with_candidate_scorer/saltrd_policy_best.pt
  # Fire REINIT when p(REINIT) >= threshold — aligns live controller with
  # rollout_policy.py simulation (oracle hard_delta +0.215 at T=0.85).
  reinit_threshold: 0.65  # lowered from 0.85; model p(REINIT) peaks at 0.65-0.77 on hard frames
  # Cosine similarity threshold for recovery candidate acceptance.
  # 0.25 = permissive default. Raising to 0.60 made truck1 worse (BUG-24 analysis:
  # SGLATrack embeddings lack identity discriminability; threshold tuning is not the fix).
  # Keep key wired for future identity-feature experiments (DINO/DAM4SAM).
  cosine_threshold: 0.25

dataset: uav123
seed: 42
