# ORTrack-DeiT baseline — no SALT-RD, no detector, pure tracker inference.
# Used to measure ORTrack-DeiT contribution as a baseline comparator to SGLATrack.

tracker:
  name: ortrack_deit
  device: auto

detector:
  name: yolo26m_visdrone
  conf_threshold: 0.25

appearance_memory:
  name: cosine_memory
  enabled: false

motion_predictor:
  name: lstm_online
  enabled: false

saltrd:
  enabled: false

dataset: uav123
seed: 42
