# AdaptiveThresholdScheduler — percentile-adaptive hysteresis (Phase 5).
#
# Adapts E_hi/E_lo from rolling signal percentiles (75th/25th by default).
# Falls back to fixed warmup thresholds until the window fills.
# Otherwise identical state machine to HysteresisBinaryScheduler.

name: adaptive_threshold
tiers: 2
args:
  window_size: 30          # rolling window length for percentile estimation
  high_percentile: 75.0    # escalation threshold (75th percentile)
  low_percentile: 25.0     # de-escalation threshold (25th percentile)
  warmup_E_hi: 0.65        # fixed E_hi during warm-up
  warmup_E_lo: 0.50        # fixed E_lo during warm-up
  confirm_frames: 5        # consecutive frames before tier commits
  cooldown_frames: 5       # post-switch lockout frames
  signal_name: motion_entropy
