# TrajectoryAwareScheduler — derivative-sensitive hysteresis (Phase 5).
#
# Shortens confirm_frames when the signal is rising fast:
#   effective_confirm = max(1, confirm_frames - int(derivative / tau))
# Otherwise identical to HysteresisBinaryScheduler.

name: trajectory_aware
tiers: 2
args:
  E_hi: 0.65              # upper threshold
  E_lo: 0.50              # lower threshold
  confirm_frames: 5       # base confirm window
  cooldown_frames: 5      # post-switch lockout frames
  tau: 0.1                # derivative sensitivity (per frame)
  signal_name: motion_entropy
