# HysteresisBinary scheduler — paper's two-state switch.
#
# States: tier 0 (LIGHT) / tier 1 (DEEP).
# Transition rules (paper §3.3):
#   tier 0 -> tier 1 when H_bar > E_hi sustained for confirm_frames,
#       and cooldown_frames elapsed since last de-escalation.
#   tier 1 -> tier 0 when H_bar < E_lo sustained for confirm_frames,
#       and cooldown_frames elapsed since last escalation.
# Reliability contract (ADR-0005): when signal.reliable=False, hold state and
# do not count frame toward confirm/cooldown.

name: hysteresis_binary
tiers: 2
args:
  signal: motion_entropy        # which signal drives switching
  E_hi: 0.65                    # paper default
  E_lo: 0.50                    # paper default
  confirm_frames: 5             # paper default (ADR-0005 Q3: independent knob)
  cooldown_frames: 5            # paper default (ADR-0005 Q3: independent knob)
  warm_standby_cadence: 0       # paper uses 10; OUR default off (PLAN §2.6)
  invert: false                 # set true when signal semantics are reversed (e.g., confidence)
