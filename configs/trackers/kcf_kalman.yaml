# KCF+Kalman tracker hyperparameters.
#
# Paper defaults (Oleksiuk & Velhosh 2026, §3):
#   sigma = 0.125 (RBF kernel bandwidth for KCF)
#   Kalman: constant-velocity model
# Tracker binds into registry as `kcf_kalman`.

name: kcf_kalman
tier_hint: 0
args:
  sigma: 0.125                # RBF kernel bandwidth
  lambda_: 0.0001             # regularization
  interp_factor: 0.02         # appearance update rate
  padding: 2.5                # search window relative to object size
  output_sigma_factor: 0.1    # Gaussian label bandwidth factor
  kalman:
    process_noise: 0.01
    measurement_noise: 0.1
    initial_velocity: [0.0, 0.0]
