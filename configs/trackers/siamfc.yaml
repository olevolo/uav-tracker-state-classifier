# SiamFC tracker hyperparameters (ADR-0004 default Siamese variant).
#
# Weights: `siamfc_alexnet_e50.pth` (got10k-trained baseline, publicly
# reachable). DevOps downloads via scripts/download_weights.py.

name: siamfc
tier_hint: 1
args:
  device: cuda                 # CPU fallback handled by the tracker impl
  dtype: float16               # TensorRT export uses FP16 on Orin (ADR-0008)
  weights: siamfc_alexnet_e50.pth
  # Search strategy
  exemplar_size: 127
  instance_size: 255
  score_size: 17
  scale_num: 3
  scale_step: 1.0375
  scale_penalty: 0.9745
  window_influence: 0.176
  total_stride: 8
  response_up: 16
