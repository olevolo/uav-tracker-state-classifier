# V3-fix TCN32 Stage1 — longer temporal window (32 frames)
seed: 42
device: cpu
val_fraction: 0.15
stratified_split: true
training_stage: 1

sampler_type: fc_source_balanced
fc_per_batch: 18
lasot_fc_cap: 0.56
aerial_fc_floor: 0.39

feature:
  use_telemetry: true
  use_bbox_dynamics: true
  use_geometry_normalised: true
  window_size: 32
  clip_value: 8.0

model:
  kind: tcn
  feature_dim: 16
  hidden_dim: 64
  num_layers: 4
  dropout: 0.1
  bidirectional: false
  n_states: 4
  enable_forecast_heads: false
  forecast_horizon: 10
  tcn:
    kernel_size: 3
    num_layers: 4
    dilations: [1, 2, 4, 8]
    hidden_dim: 64
    dropout: 0.1

loss:
  state_weights: [1.0, 1.5, 2.0, 4.0]
  risk_weight: 0.0
  aux_weight: 0.3
  use_focal: true
  focal_gamma: 2.0

optim:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  optimizer: adamw
  epochs: 30
  batch_size: 64
  early_stopping_patience: 6
  grad_clip: 1.0
  use_balanced_sampler: true

labels_dir: outputs/csc_labels/sglatrack/v3fix_combined
output_dir: outputs/csc_training/sglatrack_v3fix_tcn32_stage1
