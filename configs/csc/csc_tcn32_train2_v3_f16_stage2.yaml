# TCN-32 full training with 16 features — stage2 (forecast heads)
seed: 42
device: cpu
val_fraction: 0.15
stratified_split: true

training_stage: 2
stage1_checkpoint: outputs/csc_training/sglatrack_train2_v3_tcn32_f16_stage1/checkpoint_best.pth

sampler_type: fc_source_balanced
fc_per_batch: 20
lasot_fc_cap: 0.60
aerial_fc_floor: 0.30

feature:
  use_telemetry: true
  use_bbox_dynamics: true
  use_geometry_normalised: true
  window_size: 32
  clip_value: 8.0

model:
  kind: tcn
  feature_dim: 16
  hidden_dim: 64
  num_layers: 4
  dropout: 0.1
  bidirectional: false
  n_states: 4
  enable_forecast_heads: true
  forecast_horizon: 10
  tcn:
    kernel_size: 3
    num_layers: 4
    dilations: [1, 2, 4, 8, 16, 32]
    hidden_dim: 64
    dropout: 0.1

loss:
  state_weights: [1.0, 1.5, 2.0, 4.0]
  risk_weight: 1.0
  aux_weight: 0.3
  use_focal: false
  focal_gamma: 2.0
  forecast_failure_weight: 0.8
  forecast_fc_weight: 1.2
  forecast_lost_weight: 0.8

optim:
  lr: 5.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  epochs: 25
  batch_size: 64
  early_stopping_patience: 6
  grad_clip: 1.0
  use_balanced_sampler: true

labels_dir: outputs/csc_labels/sglatrack/train2_v3_combined
output_dir: outputs/csc_training/sglatrack_train2_v3_tcn32_f16_stage2
