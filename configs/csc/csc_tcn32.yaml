# Stage-1 CSC TCN-32 training config — causal dilated TCN, window 32.
# Dilations [1,2,4,8,16] give receptive field = 1 + 2*(1+2+4+8+16) = 63 > 32.

seed: 42
device: cpu
val_fraction: 0.15

feature:
  use_telemetry: true
  use_bbox_dynamics: true
  use_geometry_normalised: true
  window_size: 32
  clip_value: 8.0

model:
  kind: tcn
  feature_dim: 11        # auto-overridden by builder
  hidden_dim: 64
  num_layers: 5
  dropout: 0.1
  bidirectional: false
  n_states: 4
  tcn:
    kernel_size: 3
    num_layers: 5
    dilations: [1, 2, 4, 8, 16]
    hidden_dim: 64
    dropout: 0.1

loss:
  state_weights: [1.0, 1.5, 2.0, 2.5]
  risk_weight: 1.0
  aux_weight: 0.3
  use_focal: true
  focal_gamma: 2.0

optim:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  optimizer: adamw
  epochs: 30
  batch_size: 64
  early_stopping_patience: 6
  grad_clip: 1.0
  use_balanced_sampler: true

labels_dir: outputs/csc_labels
output_dir: outputs/csc_training/csc_tcn32_v2
