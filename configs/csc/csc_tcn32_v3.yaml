# CSC-V3 TCN-32 — proactive forecast model with longer memory.
# Adds 3 binary forecast heads to the V2 TCN-32 architecture for cases where
# horizon=10 forecasting needs more historical context than T=16 provides.
#
# Dilations [1,2,4,8,16] → receptive field = 1 + 2*(1+2+4+8+16) = 63 > 32.
# At T=32 with horizon=10 the model sees ~22 frames of history before the
# 10-frame forecast horizon — symmetric memory/forecast budget.
#
# Use this when csc_tcn16_v3 underperforms on failure_next_10 AUPRC or when
# the paper claims need longer-horizon forecasting (e.g. Recovery@K with K>10).

seed: 42
device: cpu
val_fraction: 0.15

feature:
  use_telemetry: true
  use_bbox_dynamics: true
  use_geometry_normalised: true
  window_size: 32
  clip_value: 8.0

model:
  kind: tcn
  feature_dim: 11        # auto-overridden by builder
  hidden_dim: 64
  num_layers: 5
  dropout: 0.1
  bidirectional: false
  n_states: 4
  enable_forecast_heads: true
  forecast_horizon: 10
  tcn:
    kernel_size: 3
    num_layers: 5
    dilations: [1, 2, 4, 8, 16]
    hidden_dim: 64
    dropout: 0.1

loss:
  state_weights: [1.0, 1.5, 2.0, 2.5]
  risk_weight: 1.0
  aux_weight: 0.3
  use_focal: true
  focal_gamma: 2.0
  forecast_failure_weight: 0.5
  forecast_fc_weight: 0.8
  forecast_lost_weight: 0.6

optim:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  optimizer: adamw
  epochs: 30
  batch_size: 64
  early_stopping_patience: 6
  grad_clip: 1.0
  use_balanced_sampler: true

labels_dir: outputs/csc_labels
output_dir: outputs/csc_training/csc_tcn32_v3
