# train2_v3: same as train2 but with V3 forecast heads enabled
# Inherits all train2 settings, adds forecast loss

seed: 42
device: cpu
val_fraction: 0.15
stratified_split: true

sampler_type: fc_source_balanced
fc_per_batch: 20
lasot_fc_cap: 0.60
aerial_fc_floor: 0.30

feature:
  use_telemetry: true
  use_bbox_dynamics: true
  use_geometry_normalised: true
  window_size: 16
  clip_value: 8.0

model:
  kind: tcn
  feature_dim: 11
  hidden_dim: 64
  num_layers: 4
  dropout: 0.1
  bidirectional: false
  n_states: 4
  enable_forecast_heads: true
  forecast_horizon: 10
  tcn:
    kernel_size: 3
    num_layers: 4
    dilations: [1, 2, 4, 8]
    hidden_dim: 64
    dropout: 0.1

loss:
  state_weights: [1.0, 1.5, 2.0, 4.0]
  risk_weight: 1.0
  aux_weight: 0.3
  use_focal: true
  focal_gamma: 2.0
  forecast_failure_weight: 0.5
  forecast_fc_weight: 0.5
  forecast_lost_weight: 0.4

optim:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  optimizer: adamw
  epochs: 30
  batch_size: 64
  early_stopping_patience: 8
  grad_clip: 1.0
  use_balanced_sampler: true

labels_dir: outputs/csc_labels/sglatrack/train2_v3_combined
output_dir: outputs/csc_training/sglatrack_train2_v3_tcn16
