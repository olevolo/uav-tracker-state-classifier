# Run 1.5 — V1 features, CORRECTED hyperparameters (diagnostic for early-peak/oscillation)
#
# Both Run 1 (V1) and Run 2 (V2) peaked at epoch 2/30 then oscillated and
# early-stopped at ep8 — a SYSTEMATIC signature of too-aggressive optimization,
# not a data problem. Train loss dropped monotonically while val plateaued
# (overfitting onset at ep2). This run tests whether a gentler schedule reaches
# a LATER and HIGHER peak.
#
# Changes vs csc_tcn16_v3fix_stage1.yaml:
#   lr               1e-3 -> 5e-4        (less overshoot)
#   scheduler        none -> cosine      (anneal into the minimum, less bounce)
#   FC state weight  4.0  -> 3.0         (within documented <=3.5 ceiling; cuts
#                                          rare-class gradient noise = osc driver)
#   patience         6    -> 10          (room for the slower schedule)
# Everything else identical (same data, sampler, model, features).
#
# Acceptance: if val derivedF1 peak > 0.674 AND FC_AUPRC peak > 0.880 (Run 1's
# ep2 numbers) -> HP was the bottleneck, adopt R1.5. If similar -> ep2 is the
# real ceiling, accept Run 1.

seed: 42
device: cpu
val_fraction: 0.15
stratified_split: true
training_stage: 1

sampler_type: fc_source_balanced
fc_per_batch: 18
lasot_fc_cap: 0.56
aerial_fc_floor: 0.39

feature:
  use_telemetry: true
  use_bbox_dynamics: true
  use_geometry_normalised: true
  window_size: 16
  clip_value: 8.0

model:
  kind: tcn
  feature_dim: 16
  hidden_dim: 64
  num_layers: 4
  dropout: 0.1
  bidirectional: false
  n_states: 4
  enable_forecast_heads: false
  forecast_horizon: 10
  tcn:
    kernel_size: 3
    num_layers: 4
    dilations: [1, 2, 4, 8]
    hidden_dim: 64
    dropout: 0.1

loss:
  state_weights: [1.0, 1.5, 2.0, 3.0]
  risk_weight: 0.0
  aux_weight: 0.3
  use_focal: true
  focal_gamma: 2.0

optim:
  lr: 5.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  min_lr_ratio: 0.02
  epochs: 30
  batch_size: 64
  early_stopping_patience: 10
  grad_clip: 1.0
  use_balanced_sampler: true

labels_dir: outputs/csc_labels/sglatrack/v3fix_combined
output_dir: outputs/csc_training/sglatrack_v3fix_r15_tcn16_stage1
