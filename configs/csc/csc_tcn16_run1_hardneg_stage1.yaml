# Run 1 — Hard-negative TCN16 Stage1 (v3fix derivative)
# Derived from configs/csc/csc_tcn16_v3fix_stage1.yaml
# Adds aerial_non_fc_floor / hard_scale_cc_floor / scale_pct_threshold for hard-neg sampling

seed: 42
device: cpu
val_fraction: 0.15
stratified_split: true
training_stage: 1

sampler_type: fc_source_balanced
fc_per_batch: 20
lasot_fc_cap: 0.60
aerial_fc_floor: 0.30

# Hard-negative sampling controls (Run 1)
aerial_non_fc_floor: 16
hard_scale_cc_floor: 8
scale_pct_threshold: 75.0

feature:
  use_telemetry: true
  use_bbox_dynamics: true
  use_geometry_normalised: true
  window_size: 16
  clip_value: 8.0

model:
  kind: tcn
  feature_dim: 16
  hidden_dim: 64
  num_layers: 4
  dropout: 0.1
  bidirectional: false
  n_states: 4
  enable_forecast_heads: false
  forecast_horizon: 10
  tcn:
    kernel_size: 3
    num_layers: 4
    dilations: [1, 2, 4, 8]
    hidden_dim: 64
    dropout: 0.1

loss:
  state_weights: [1.0, 1.5, 2.0, 4.0]
  risk_weight: 0.0
  aux_weight: 0.3
  use_focal: true
  focal_gamma: 2.0

optim:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  optimizer: adamw
  epochs: 30
  batch_size: 64
  early_stopping_patience: 6
  grad_clip: 1.0
  use_balanced_sampler: true

labels_dir: outputs/csc_labels/sglatrack/v3fix_combined
output_dir: outputs/csc_training/sglatrack_run1_hardneg_tcn16_stage1
