# Stage-1 CSC GRU training config.

seed: 42
device: cuda
val_fraction: 0.15

feature:
  use_telemetry: true
  use_bbox_dynamics: true
  use_geometry_normalised: true
  window_size: 20
  clip_value: 8.0

model:
  feature_dim: 11        # auto-overridden by builder
  hidden_dim: 64
  num_layers: 2
  dropout: 0.1
  bidirectional: false   # MUST be false for causal inference
  n_states: 4            # 4 derived paper states (composite head)

loss:
  # state_weights ordering = [CORRECT_CONFIRMED, CORRECT_UNCERTAIN,
  #                            LOST_AWARE, FALSE_CONFIRMED]
  state_weights: [1.0, 1.5, 2.0, 2.5]
  risk_weight: 1.0
  aux_weight: 0.3
  use_focal: false

optim:
  lr: 1.0e-3
  weight_decay: 1.0e-4
  optimizer: adamw
  epochs: 30
  batch_size: 64
  early_stopping_patience: 6
  grad_clip: 1.0

# Filled in by tools/train_csc.py
labels_dir: outputs/csc_labels
output_dir: outputs/csc_training/csc_gru
