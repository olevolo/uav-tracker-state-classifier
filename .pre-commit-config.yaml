# UAV Entropy-Guided Tracker — pre-commit configuration
#
# Runs locally via `pre-commit run --all-files` and in CI. Hooks MUST NOT be
# bypassed with --no-verify. If a hook is wrong, fix the hook.
#
# DevOps: swap action version tags for full SHAs before enforcing branch
# protection. Repo-ref tags are stable enough for Phase 0 bootstrap.

default_language_version:
  python: python3.10

default_stages: [pre-commit]

repos:
  # -- Hygiene --------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict

  # -- Formatting + linting -------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  # -- Type checking (src only; avoid thrashing tests during refactors) ----
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - types-PyYAML

  # -- Secret scanning ------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            .*\.lock|
            requirements.*\.txt
          )$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # -- Conventional Commits lint on commit-msg -----------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.27.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
